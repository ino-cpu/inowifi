<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEXUS | WA Reactor + All-in-One Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:radial-gradient(circle at 20%30%,#0a0a0f,#030304);font-family:'Inter','Space Grotesk',sans-serif;color:#eef5ff;min-height:100vh;padding:2rem 1.5rem;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');background-repeat:repeat;pointer-events:none;z-index:1;opacity:0.25}
    .container{max-width:1350px;margin:0 auto;position:relative;z-index:5}
    .cyber-header{text-align:center;margin-bottom:3rem}
    .glitch{font-size:3.2rem;font-weight:800;background:linear-gradient(135deg,#aaffff,#00e0ff,#7700ff);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 8px rgba(0,255,255,0.5);display:inline-block;position:relative}
    .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#aaffff,#00e0ff,#7700ff);-webkit-background-clip:text;background-clip:text;color:transparent}
    .glitch::before{animation:glitch-1 0.4s infinite reverse;clip-path:polygon(0 0,100% 0,100% 45%,0 45%);transform:translate(-2px,-1px)}
    .glitch::after{animation:glitch-2 0.3s infinite;clip-path:polygon(0 80%,100% 20%,100% 100%,0 100%);transform:translate(2px,1px)}
    @keyframes glitch-1{0%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0)}}
    @keyframes glitch-2{0%{transform:translate(0)}20%{transform:translate(2px,-1px)}40%{transform:translate(-2px,1px)}60%{transform:translate(1px,2px)}80%{transform:translate(-1px,-2px)}100%{transform:translate(0)}}
    .sub{font-family:'Space Grotesk',monospace;color:#8aaaff;border-left:3px solid #0ff;padding-left:1rem;margin-top:0.5rem}
    .suite-grid{display:flex;flex-direction:column;gap:2.5rem}
    .card{background:rgba(10,20,30,0.65);backdrop-filter:blur(12px);border-radius:2rem;border:1px solid rgba(0,255,255,0.3);transition:all 0.25s ease;overflow:hidden}
    .card:hover{border-color:rgba(0,255,255,0.7);box-shadow:0 20px 40px rgba(0,200,255,0.2)}
    .card-header{padding:1.5rem 2rem;background:rgba(0,20,30,0.6);border-bottom:1px solid rgba(0,255,255,0.3);display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.5rem}
    .card-header i{color:#0ff;font-size:1.8rem;filter:drop-shadow(0 0 5px cyan)}
    .card-body{padding:2rem}
    .input-group{margin-bottom:1.5rem}
    .input-group label{display:block;margin-bottom:0.5rem;font-weight:500;color:#bbddff}
    input,select{width:100%;background:rgba(0,0,0,0.6);border:1px solid #2c5f6e;border-radius:1.2rem;padding:0.9rem 1.2rem;color:#fff;font-size:1rem;font-family:monospace}
    input:focus,select:focus{outline:none;border-color:#0ff;box-shadow:0 0 12px rgba(0,255,255,0.4)}
    .dual-emoji{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
    .emoji-select{flex:2}
    .custom-emoji{flex:1;text-align:center;font-size:2rem;background:#071a1f;border-radius:1.2rem;padding:0.5rem;cursor:pointer;border:1px solid #2c5f6e}
    button{background:linear-gradient(95deg,#00a6c4,#2b2b9b);border:none;padding:12px 24px;border-radius:2rem;font-weight:700;font-size:1rem;color:white;display:inline-flex;align-items:center;gap:0.6rem;cursor:pointer;transition:0.2s;box-shadow:0 4px 12px rgba(0,160,200,0.3)}
    button:hover{transform:translateY(-2px);filter:brightness(1.05)}
    .result-box{margin-top:1.5rem;background:#010b0f80;border-radius:1.2rem;padding:1rem;border-left:4px solid #0ff;font-family:monospace;font-size:0.9rem;word-break:break-word}
    .loading{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:cyan;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .badge-free{font-size:0.7rem;background:#0ff220;color:#000;border-radius:30px;padding:2px 8px;margin-left:10px;vertical-align:middle}
    footer{text-align:center;margin-top:3rem;opacity:0.6;font-size:0.8rem}
    .media-list{margin-top:1rem}
    .media-item{background:#0a1a22;padding:0.8rem;border-radius:1rem;margin-bottom:0.8rem}
    .media-item a{color:#0ff;text-decoration:none;word-break:break-all}
    .media-item a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="container">
  <div class="cyber-header">
    <h1 class="glitch" data-text="NEXUS_HUB">NEXUS_HUB</h1>
    <p class="sub">// REACTION ENGINE + ALL-IN-ONE DOWNLOADER // CYBER TOOLKIT</p>
  </div>
  <div class="suite-grid">
    <!-- REACTION WA -->
    <div class="card">
      <div class="card-header"><i class="fab fa-whatsapp"></i> <span>WA Channel Reactor <span class="badge-free">FREE BOT ARMY</span></span></div>
      <div class="card-body">
        <div class="input-group"><label><i class="fas fa-link"></i> Channel Post URL</label><input type="text" id="waUrl" placeholder="https://whatsapp.com/channel/.../115" value="https://whatsapp.com/channel/0029Vb7YuKV6buMHtVBW4w1W/115"></div>
        <div class="input-group"><label><i class="fas fa-smile-wink"></i> Pilih Emoji Reaction</label>
          <div class="dual-emoji"><select id="emojiSelect"><option value="👍">👍 Like</option><option value="❤️">❤️ Heart</option><option value="😊">😊 Smile</option><option value="👑">👑 Crown</option><option value="🚀">🚀 Rocket</option><option value="🔥">🔥 Fire</option></select><div class="custom-emoji" id="customEmojiBtn">👑</div></div>
        </div>
        <button id="sendReactionBtn"><i class="fas fa-bolt"></i> DEPLOY REACTION</button>
        <div id="reactResult" class="result-box" style="display: none;"></div>
      </div>
    </div>
    <!-- ALL-IN-ONE DOWNLOADER -->
    <div class="card">
      <div class="card-header"><i class="fas fa-download"></i> <span>All-in-One Downloader <span class="badge-free">Instagram · TikTok · YouTube</span></span></div>
      <div class="card-body">
        <div class="input-group"><label><i class="fas fa-globe"></i> Media URL</label><input type="text" id="downloaderUrl" placeholder="https://vt.tiktok.com/ZSQ2ydLUC/"></div>
        <button id="downloadBtn"><i class="fas fa-cloud-download-alt"></i> PROSES & TAMPILKAN LINK</button>
        <div id="downloadResult" class="result-box" style="display: none;"></div>
      </div>
    </div>
    <footer><i class="fas fa-shield-alt"></i> Powered by Vercel Proxy | WA Reaction + All Downloader</footer>
  </div>
</div>

<script>
  // =============== 1. REACTION WA (via /api/react) ===============
  const sendReaction = async (url, emojis) => {
    const res = await fetch(`/api/react?url=${encodeURIComponent(url)}&emojis=${encodeURIComponent(emojis)}&apikey=nanasfree`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.status !== true && data.status !== "true") throw new Error(data.message || "Reaction failed");
    return data;
  };

  const emojiSelect = document.getElementById('emojiSelect');
  const customBtn = document.getElementById('customEmojiBtn');
  let currentEmoji = emojiSelect.value;
  emojiSelect.addEventListener('change', (e) => { currentEmoji = e.target.value; customBtn.innerText = currentEmoji; });
  customBtn.addEventListener('click', () => {
    let newEmoji = prompt("Emoji custom:", currentEmoji);
    if (newEmoji && newEmoji.trim()) {
      currentEmoji = newEmoji.trim();
      customBtn.innerText = currentEmoji;
      let opt = document.createElement('option');
      opt.value = currentEmoji;
      opt.textContent = `${currentEmoji} Custom`;
      emojiSelect.appendChild(opt);
      emojiSelect.value = currentEmoji;
    }
  });

  document.getElementById('sendReactionBtn').addEventListener('click', async () => {
    const waUrl = document.getElementById('waUrl').value.trim();
    const emoji = currentEmoji;
    const resultDiv = document.getElementById('reactResult');
    if (!waUrl) { resultDiv.style.display = 'block'; resultDiv.innerHTML = '⚠️ Masukkan URL Channel WhatsApp'; return; }
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `<div class="loading"></div> Mengirim reaksi ${emoji} ...`;
    try {
      const res = await sendReaction(waUrl, emoji);
      resultDiv.innerHTML = `<i class="fas fa-check-circle" style="color:#0f0;"></i> ✅ ${res.message}<br>📡 URL: ${res.url}<br>😀 Emoji: ${res.emojis}<br>🤖 77 reactions diproses.`;
    } catch (err) {
      resultDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff5555;"></i> ERROR: ${err.message}`;
    }
  });

  // =============== 2. ALL-IN-ONE DOWNLOADER (via /api/downloader) ===============
  async function fetchMediaViaProxy(url) {
    const proxyUrl = `/api/downloader?url=${encodeURIComponent(url)}`;
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (data.status !== true) throw new Error(data.message || "Gagal memproses URL");
    return data;
  }

  function renderMediaList(apiData) {
    const mediaData = apiData.result?.result;
    if (!mediaData || !mediaData.medias || !Array.isArray(mediaData.medias)) {
      throw new Error("Tidak ada media ditemukan untuk URL ini.");
    }
    let html = `<div class="media-list"><h3>✅ Download siap</h3>`;
    if (mediaData.title) html += `<p><strong>Judul:</strong> ${escapeHtml(mediaData.title)}</p>`;
    if (mediaData.unique_id) html += `<p><strong>Uploader:</strong> @${escapeHtml(mediaData.unique_id)}</p>`;
    if (mediaData.duration) html += `<p><strong>Durasi:</strong> ${(mediaData.duration / 1000).toFixed(1)} detik</p>`;
    html += `<h4>Pilih kualitas:</h4>`;
    for (const media of mediaData.medias) {
      let label = `${media.type?.toUpperCase() || 'MEDIA'} - ${media.quality || 'Standar'} (${media.extension || 'file'})`;
      html += `<div class="media-item"><strong>📁 ${escapeHtml(label)}</strong><br><a href="${escapeHtml(media.url)}" target="_blank" download>🔗 Klik untuk download / simpan link</a></div>`;
    }
    html += `</div>`;
    return html;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  document.getElementById('downloadBtn').addEventListener('click', async () => {
    const url = document.getElementById('downloaderUrl').value.trim();
    const resultDiv = document.getElementById('downloadResult');
    if (!url) {
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '⚠️ Masukkan URL media';
      return;
    }
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `<div class="loading"></div> Memproses URL... (5-10 detik)`;
    try {
      const result = await fetchMediaViaProxy(url);
      const html = renderMediaList(result);
      resultDiv.innerHTML = html;
    } catch (err) {
      console.error(err);
      resultDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff5555;"></i> ERROR: ${err.message}<br>Pastikan URL benar (Instagram/TikTok/YouTube) dan coba lagi.`;
    }
  });
</script>
</body>
</html>
